<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>スケジュールピッカー</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif;
      background: #f5f7fa;
      color: #333;
    }

    /* ===== Header ===== */
    header {
      background: #1a73e8;
      color: white;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    header h1 { font-size: 16px; font-weight: 600; }
    #logout-btn {
      font-size: 13px;
      font-weight: 600;
      background: rgba(255,255,255,0.2);
      border: 1.5px solid white;
      color: white;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      display: none;
    }
    #logout-btn.visible { display: inline-block !important; }

    /* ===== Auth ===== */
    #auth-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 70vh;
      gap: 20px;
      padding: 32px 24px;
      text-align: center;
    }
    #auth-section p { font-size: 15px; color: #555; line-height: 1.7; }
    .google-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 26px;
      background: white;
      border: 1px solid #dadce0;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0,0,0,0.15);
      color: #333;
    }

    /* ===== Controls ===== */
    .controls {
      background: white;
      border-bottom: 1px solid #e8eaed;
    }
    .week-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
    }
    .week-nav button {
      padding: 6px 14px;
      border: 1px solid #dadce0;
      border-radius: 6px;
      background: white;
      font-size: 14px;
      cursor: pointer;
      color: #1a73e8;
      font-weight: 500;
    }
    .week-label { font-size: 13px; font-weight: 500; color: #444; }

    .dur-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px 10px;
      overflow-x: auto;
    }
    .dur-label { font-size: 12px; color: #666; flex-shrink: 0; }
    .dur-btn {
      flex-shrink: 0;
      padding: 5px 14px;
      border-radius: 14px;
      border: 1.5px solid #1a73e8;
      color: #1a73e8;
      background: white;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }
    .dur-btn.active { background: #1a73e8; color: white; }

    /* ===== Calendar grid ===== */
    .cal-outer {
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      max-height: 44vh;
      background: white;
      border-bottom: 1px solid #e8eaed;
    }
    .cal-grid {
      display: grid;
      grid-template-columns: 38px repeat(7, minmax(48px, 1fr));
      width: max-content;
      min-width: 100%;
    }

    /* Corner (sticky top-left) */
    .cal-corner {
      position: sticky;
      top: 0;
      left: 0;
      z-index: 20;
      background: white;
      border-right: 1px solid #e8eaed;
      border-bottom: 2px solid #e8eaed;
    }

    /* Day headers */
    .day-hdr {
      position: sticky;
      top: 0;
      z-index: 10;
      background: white;
      text-align: center;
      padding: 4px 2px 5px;
      border-bottom: 2px solid #e8eaed;
      border-right: 1px solid #f0f0f0;
    }
    .day-hdr.today { background: #e8f0fe; }
    .day-hdr.today .day-num { color: #1a73e8; font-weight: 700; }
    .day-hdr.sat .day-dow { color: #1a73e8; }
    .day-hdr.sun .day-dow { color: #e53935; }
    .day-dow { font-size: 10px; color: #666; }
    .day-num { font-size: 18px; font-weight: 400; line-height: 1.3; }

    /* Time labels */
    .t-label {
      position: sticky;
      left: 0;
      z-index: 5;
      background: white;
      font-size: 9px;
      color: #aaa;
      text-align: right;
      padding: 0 4px;
      height: 30px;
      line-height: 30px;
      border-right: 1px solid #e8eaed;
    }

    /* Slots */
    .slot {
      height: 30px;
      border-bottom: 1px solid #f5f5f5;
      border-right: 1px solid #f0f0f0;
      cursor: pointer;
      position: relative;
      touch-action: manipulation;
    }
    .slot.hour-top { border-top: 1px solid #e8eaed; }
    .slot.blocked {
      background: #e8f0fe;
      cursor: default;
      overflow: hidden;
    }
    .ev-title {
      position: absolute;
      top: 0; left: 2px; right: 2px; bottom: 0;
      font-size: 9px;
      color: #1558d6;
      display: flex;
      align-items: center;
      overflow: hidden;
      white-space: nowrap;
    }
    .slot.selected { background: #34a853 !important; }
    .slot.sel-top    { border-radius: 4px 4px 0 0; }
    .slot.sel-bottom { border-radius: 0 0 4px 4px; }
    .slot.sel-only   { border-radius: 4px; }

    /* ===== Output ===== */
    .output-section {
      padding: 14px 16px 32px;
      background: white;
      margin-top: 8px;
    }
    .output-section h2 { font-size: 14px; font-weight: 600; margin-bottom: 10px; }

    .cand-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
      min-height: 34px;
    }
    .cand-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #e8f5e9;
      border: 1.5px solid #34a853;
      border-radius: 16px;
      padding: 5px 12px;
      font-size: 13px;
      font-weight: 500;
    }
    .del-btn {
      background: none;
      border: none;
      color: #34a853;
      cursor: pointer;
      font-size: 17px;
      font-weight: 700;
      padding: 0;
      line-height: 1;
    }
    .empty-note { font-size: 13px; color: #aaa; }

    .out-text {
      width: 100%;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      min-height: 90px;
      resize: none;
      color: #333;
      font-family: inherit;
      line-height: 1.8;
    }
    .out-text:focus { outline: none; border-color: #1a73e8; }

    .copy-btn {
      width: 100%;
      margin-top: 10px;
      padding: 14px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    .copy-btn.done { background: #34a853; }

    .loading-msg {
      text-align: center;
      padding: 24px;
      color: #999;
      font-size: 13px;
      grid-column: 1 / -1;
    }
  </style>
</head>
<body>

<header>
  <h1>スケジュールピッカー</h1>
  <button id="logout-btn" onclick="signOut()">ログアウト</button>
</header>

<!-- ===== Auth ===== -->
<div id="auth-section">
  <p>Googleカレンダーの予定を見ながら<br>候補日をサクサク選べます</p>
  <button class="google-btn" onclick="signIn()">
    <svg width="18" height="18" viewBox="0 0 48 48">
      <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
      <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
      <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
      <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
    </svg>
    Googleでログイン
  </button>
</div>

<!-- ===== Main (hidden until login) ===== -->
<div id="cal-section" style="display:none">
  <div class="controls">
    <div class="week-nav">
      <button onclick="changeWeek(-1)">‹ 前週</button>
      <span class="week-label" id="week-label">-</span>
      <button onclick="changeWeek(1)">次週 ›</button>
    </div>
    <div class="dur-bar">
      <span class="dur-label">時間帯：</span>
      <button class="dur-btn active" data-m="30"  onclick="setDur(30)">30分</button>
      <button class="dur-btn"        data-m="60"  onclick="setDur(60)">1時間</button>
      <button class="dur-btn"        data-m="90"  onclick="setDur(90)">1.5時間</button>
      <button class="dur-btn"        data-m="120" onclick="setDur(120)">2時間</button>
    </div>
  </div>

  <div class="cal-outer">
    <div class="cal-grid" id="cal-grid">
      <div class="loading-msg">読み込み中...</div>
    </div>
  </div>

  <div class="output-section">
    <h2>候補日一覧</h2>
    <div class="cand-chips" id="cand-chips">
      <span class="empty-note">↑ 空き時間をタップして追加</span>
    </div>
    <textarea class="out-text" id="out-text" readonly placeholder="候補日をタップすると表示されます…"></textarea>
    <button class="copy-btn" id="copy-btn" onclick="copyOut()">コピー</button>
  </div>
</div>

<script>
'use strict';

// ============================================================
// 設定
// ============================================================
const CLIENT_ID = '87000522044-4l5ur9te47hu503oq8md3dsp9dkile2k.apps.googleusercontent.com';
const SCOPE     = 'https://www.googleapis.com/auth/calendar.readonly';
const DAY_JP    = ['日','月','火','水','木','金','土'];
const START_H   = 8;   // 表示開始時刻（時）
const END_H     = 23;  // 表示終了時刻（時）

// ============================================================
// 状態
// ============================================================
let tokenClient;
let gapiReady = false;
let gisReady  = false;
let weekStart = monday(new Date());
let evMap     = {};  // "YYYY-MM-DD|HH:MM" → イベント名
let blocks    = [];  // { date, start(mins), end(mins) }
let dur       = 30;

// ============================================================
// Google Auth
// ============================================================
function onGapiLoad() {
  gapi.load('client', async () => {
    await gapi.client.init({
      discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest'],
    });
    gapiReady = true;
  });
}

function onGisLoad() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPE,
    callback: (resp) => {
      if (resp.error) return;
      document.getElementById('auth-section').style.display = 'none';
      document.getElementById('cal-section').style.display  = 'block';
      const lb = document.getElementById('logout-btn'); lb.style.display='inline-block'; lb.classList.add('visible');
      loadCal();
    },
  });
  gisReady = true;
}

function signIn() {
  if (!gapiReady || !gisReady) { setTimeout(signIn, 300); return; }
  tokenClient.requestAccessToken({ prompt: 'select_account' });
}

function signOut() {
  const tok = gapi.client.getToken();
  if (tok) google.accounts.oauth2.revoke(tok.access_token);
  gapi.client.setToken(null);
  // Googleのセッションキャッシュもクリア
  google.accounts.id.disableAutoSelect();
  document.getElementById('auth-section').style.display = 'flex';
  document.getElementById('cal-section').style.display  = 'none';
  document.getElementById('logout-btn').style.display   = 'none';
  blocks = [];
  renderOutput();
}

// ============================================================
// 週ナビゲーション
// ============================================================
function monday(d) {
  const r = new Date(d);
  const day = r.getDay();
  r.setDate(r.getDate() - (day === 0 ? 6 : day - 1));
  r.setHours(0, 0, 0, 0);
  return r;
}

function changeWeek(delta) {
  weekStart = new Date(weekStart);
  weekStart.setDate(weekStart.getDate() + delta * 7);
  loadCal();
}

// ============================================================
// カレンダー読み込み
// ============================================================
async function loadCal() {
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '<div class="loading-msg">読み込み中...</div>';

  const end = new Date(weekStart);
  end.setDate(end.getDate() + 7);

  try {
    // 全カレンダーからイベントを取得
    const calList = await gapi.client.calendar.calendarList.list({ minAccessRole: 'reader' });
    const calIds  = (calList.result.items || [])
      .filter(c => c.selected !== false)
      .map(c => c.id);

    const allEvs = await Promise.all(calIds.map(id =>
      gapi.client.calendar.events.list({
        calendarId: id,
        timeMin: weekStart.toISOString(),
        timeMax: end.toISOString(),
        singleEvents: true,
        orderBy: 'startTime',
        maxResults: 250,
      }).then(r => r.result.items || []).catch(() => [])
    ));

    buildEvMap(allEvs.flat());
  } catch (e) {
    console.error(e);
    evMap = {};
  }

  renderGrid();
}

function buildEvMap(evs) {
  evMap = {};
  for (const ev of evs) {
    if (!ev.start?.dateTime) continue; // 終日予定はスキップ
    const s = new Date(ev.start.dateTime);
    const e = new Date(ev.end.dateTime);
    const date = fmtDate(s);
    // 開始を30分単位で切り捨て、終了を30分単位で切り上げ
    const sm = Math.floor((s.getHours() * 60 + s.getMinutes()) / 30) * 30;
    const em = Math.ceil((e.getHours() * 60 + e.getMinutes()) / 30) * 30;
    for (let m = sm; m < em; m += 30) {
      evMap[`${date}|${t(m)}`] = ev.summary || '予定';
    }
  }
}

// ============================================================
// グリッド描画
// ============================================================
function renderGrid() {
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  const today = new Date();
  today.setHours(0, 0, 0, 0);

  const days = Array.from({ length: 7 }, (_, i) => {
    const d = new Date(weekStart);
    d.setDate(d.getDate() + i);
    return d;
  });

  // 週ラベル更新
  document.getElementById('week-label').textContent =
    `${days[0].getMonth()+1}/${days[0].getDate()} – ${days[6].getMonth()+1}/${days[6].getDate()}`;

  // コーナー（左上の固定セル）
  grid.appendChild(mk('div', 'cal-corner'));

  // 曜日ヘッダー
  for (const d of days) {
    const dow = d.getDay();
    let cls = 'day-hdr';
    if (+d === +today)  cls += ' today';
    else if (dow === 6) cls += ' sat';
    else if (dow === 0) cls += ' sun';
    const h = mk('div', cls);
    h.innerHTML = `<div class="day-dow">${DAY_JP[dow]}</div><div class="day-num">${d.getDate()}</div>`;
    grid.appendChild(h);
  }

  // 選択中のスロットセットを構築
  const selSet = buildSelSet();

  // 時間スロット行
  for (let h = START_H; h < END_H; h++) {
    for (let half = 0; half < 2; half++) {
      const m   = half * 30;
      const min = h * 60 + m;
      const ts  = t(min);

      // 時刻ラベル（00分のみ表示）
      const tl = mk('div', 't-label');
      tl.textContent = m === 0 ? ts : '';
      grid.appendChild(tl);

      // 各日のスロット
      for (const d of days) {
        const dateStr = fmtDate(d);
        const key     = `${dateStr}|${ts}`;
        const sl      = mk('div', 'slot');
        if (m === 0) sl.classList.add('hour-top');

        if (evMap[key]) {
          // 既存予定
          sl.classList.add('blocked');
          const ev = mk('span', 'ev-title');
          ev.textContent = evMap[key];
          sl.appendChild(ev);
        } else if (selSet.has(key)) {
          // 選択済み
          sl.classList.add('selected');
          const prevSel = selSet.has(`${dateStr}|${t(min - 30)}`);
          const nextSel = selSet.has(`${dateStr}|${t(min + 30)}`);
          if (!prevSel && !nextSel) sl.classList.add('sel-only');
          else if (!prevSel)        sl.classList.add('sel-top');
          else if (!nextSel)        sl.classList.add('sel-bottom');
          sl.onclick = () => tapSlot(dateStr, min);
        } else {
          // 空き
          sl.onclick = () => tapSlot(dateStr, min);
        }

        grid.appendChild(sl);
      }
    }
  }
}

function buildSelSet() {
  const set = new Set();
  for (const b of blocks) {
    for (let m = b.start; m < b.end; m += 30) {
      set.add(`${b.date}|${t(m)}`);
    }
  }
  return set;
}

// ============================================================
// スロットのタップ処理
// ============================================================
function tapSlot(dateStr, mins) {
  // 既存ブロックに含まれていれば削除
  const idx = blocks.findIndex(b => b.date === dateStr && mins >= b.start && mins < b.end);
  if (idx >= 0) {
    blocks.splice(idx, 1);
    renderGrid();
    renderOutput();
    return;
  }

  // 既存予定があればスキップ
  if (evMap[`${dateStr}|${t(mins)}`]) return;

  // 選択するブロックの範囲チェック
  const endMins = mins + dur;
  for (let m = mins; m < endMins; m += 30) {
    if (m >= END_H * 60) return;
    if (evMap[`${dateStr}|${t(m)}`]) return;
    if (blocks.some(b => b.date === dateStr && m >= b.start && m < b.end)) return;
  }

  // ブロック追加
  blocks.push({ date: dateStr, start: mins, end: endMins });
  blocks.sort((a, b) => a.date.localeCompare(b.date) || a.start - b.start);
  renderGrid();
  renderOutput();
}

// ============================================================
// 時間帯設定
// ============================================================
function setDur(m) {
  dur = m;
  document.querySelectorAll('.dur-btn').forEach(b => {
    b.classList.toggle('active', +b.dataset.m === m);
  });
}

// ============================================================
// 出力
// ============================================================
function renderOutput() {
  const chips    = document.getElementById('cand-chips');
  const textarea = document.getElementById('out-text');

  if (blocks.length === 0) {
    chips.innerHTML = '<span class="empty-note">↑ 空き時間をタップして追加</span>';
    textarea.value  = '';
    return;
  }

  chips.innerHTML = blocks.map((b, i) =>
    `<div class="cand-chip">
      <span>${blockLabel(b)}</span>
      <button class="del-btn" onclick="removeBlock(${i})">×</button>
    </div>`
  ).join('');

  textarea.value = blocks.map(blockLabel).join('\n');
}

function blockLabel(b) {
  const [y, mo, day] = b.date.split('-').map(Number);
  const d = new Date(y, mo - 1, day);
  return `${mo}/${day}(${DAY_JP[d.getDay()]})${t(b.start)}~${t(b.end)}`;
}

function removeBlock(i) {
  blocks.splice(i, 1);
  renderGrid();
  renderOutput();
}

function copyOut() {
  const text = document.getElementById('out-text').value;
  if (!text) return;
  const btn = document.getElementById('copy-btn');
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'コピーしました ✓';
    btn.classList.add('done');
    setTimeout(() => { btn.textContent = 'コピー'; btn.classList.remove('done'); }, 2000);
  }).catch(() => {
    document.getElementById('out-text').select();
    document.execCommand('copy');
  });
}

// ============================================================
// ユーティリティ
// ============================================================
function mk(tag, cls) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  return e;
}

function fmtDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function t(mins) {
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
}

// ===== スクリプト動的読み込み =====
function loadScript(src, callback) {
  const s = document.createElement('script');
  s.src = src;
  s.onload = callback;
  s.onerror = () => console.error('Failed to load:', src);
  document.head.appendChild(s);
}

loadScript('https://apis.google.com/js/api.js', onGapiLoad);
loadScript('https://accounts.google.com/gsi/client', onGisLoad);
</script>
</body>
</html>
